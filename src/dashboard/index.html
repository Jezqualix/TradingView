<!DOCTYPE html>
<html lang="nl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradingView × Claude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-600: #007c30;
      --brand-700: #026c3d;
      --brand-900: #003012;
      --accent: #ffdd00;
      --accent-hover: #e6c800;

      --bg: #0f1612;
      --bg-card: #1a2420;
      --bg-header: #0a0f0c;

      --text-primary: #f0f0f0;
      --text-body: #c8c8c8;
      --text-muted: #888888;
      --text-on-dark: #f0f0f0;

      --border: #2a3830;
      --border-card: #2a3830;
      --shadow-card: 0 1px 4px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.4), 0 8px 32px rgba(0,0,0,0.3);

      --radius: 12px;
      --radius-sm: 6px;
      --radius-pill: 9999px;

      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --transition: 0.18s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.6;
      background-color: var(--bg);
      color: var(--text-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: var(--bg-header);
      border-bottom: 3px solid var(--accent);
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-card);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      color: var(--brand-600);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    header h1 span { color: var(--accent); }

    .header-links {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .header-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-link:hover {
      background: rgba(0, 160, 64, 0.1);
      color: var(--brand-600);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px;
      flex: 1;
    }

    .portfolio-widget {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 32px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      box-shadow: var(--shadow-card);
    }

    .portfolio-stat {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .portfolio-stat .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .portfolio-stat .value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .portfolio-stat .value.highlight {
      color: var(--brand-600);
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    .ticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .ticker-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow-card);
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ticker-card:hover {
      box-shadow: var(--shadow-hover);
      border-color: var(--brand-700);
    }
    .ticker-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .ticker-card-header-left .ticker-symbol {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }
    .ticker-card-header-left .ticker-name {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }
    .ticker-card-header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ticker-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 2px 6px;
    }
    .ticker-refresh-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 2px 4px;
      border-radius: var(--radius-sm);
      transition: color var(--transition);
      line-height: 1;
    }
    .ticker-refresh-btn:hover { color: var(--brand-600); }
    .ticker-refresh-btn.spinning { animation: spin 0.8s linear infinite; }

    .ticker-price-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .ticker-price {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }
    .ticker-change {
      font-size: 0.85rem;
      font-weight: 600;
    }
    .ticker-change.positive { color: var(--brand-600); }
    .ticker-change.negative { color: #ff6666; }
    .ticker-stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .ticker-stat { display: flex; flex-direction: column; gap: 1px; }
    .ticker-stat .stat-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .ticker-stat .stat-value { font-size: 0.82rem; font-weight: 500; color: var(--text-body); }
    .ticker-stat .stat-value.up { color: var(--brand-600); }
    .ticker-stat .stat-value.down { color: #ff6666; }
    .ticker-footer { font-size: 0.7rem; color: var(--text-muted); text-align: right; }
    .ticker-no-data { font-size: 0.8rem; color: var(--text-muted); text-align: center; padding: 8px 0; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state h3 { color: var(--text-primary); margin-bottom: 8px; }
    .loading { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .loading span { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .container { padding: 16px; }
      .portfolio-widget { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px; }
      .ticker-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
      header { padding: 16px 20px; }
      .header-link { font-size: 0.8rem; padding: 6px 10px; }
    }

    @media (max-width: 480px) {
      .container { padding: 12px; }
      .portfolio-widget { grid-template-columns: 1fr; gap: 8px; padding: 12px; }
      .ticker-grid { grid-template-columns: 1fr; }
      .section-title { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>TradingView <span>×</span> Claude</h1>
    <div class="header-links">
      <button id="global-refresh-btn" onclick="triggerRefresh()" style="background:none;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;padding:6px 12px;border-radius:var(--radius-pill);font-size:0.85rem;transition:all var(--transition)">
        <span id="refresh-icon" style="display:inline-block">&#8635;</span> Refresh
      </button>
      <a href="/dashboard.html" class="header-link">📊 Dashboard</a>
      <a href="/admin.html" class="header-link">⚙️ Beheer</a>
    </div>
  </header>

  <div class="container">
    <div class="portfolio-widget" id="portfolio"></div>
    <h2 class="section-title">Koersen</h2>
    <div class="ticker-grid" id="ticker-grid">
      <div class="loading"><span>⏳</span> Laden...</div>
    </div>
  </div>

  <script>
    const API = '';

    function timeAgo(date) {
      if (!date) return '—';
      const d = new Date(date);
      const now = new Date();
      const seconds = Math.floor((now - d) / 1000);
      if (seconds < 60) return Math.floor(seconds) + 's geleden';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return minutes + 'm geleden';
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return hours + 'h geleden';
      return d.toLocaleDateString('nl-BE');
    }

    function formatPrice(price) {
      if (!price && price !== 0) return '—';
      if (price >= 1) return parseFloat(price).toFixed(2);
      return parseFloat(price).toFixed(price < 0.01 ? 4 : 2);
    }

    async function loadPortfolio() {
      try {
        const data = await fetch(API + '/api/portfolio').then(r => r.json());
        if (!data) return;

        const winRate = data.total_trades > 0
          ? ((data.winning_trades / data.total_trades) * 100).toFixed(1)
          : '0.0';

        const pnl = data.current_balance - data.starting_balance;
        const el = document.getElementById('portfolio');
        el.innerHTML = '';

        const stats = [
          { label: 'Balans', value: '$' + data.current_balance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }), highlight: true },
          { label: 'P&L', value: '$' + (pnl >= 0 ? '+' : '') + pnl.toFixed(2), highlight: false, color: pnl >= 0 ? 'var(--brand-600)' : '#ff6666' },
          { label: 'Win Rate', value: winRate + '%', highlight: true },
          { label: 'Posities', value: data.open_positions || 0, highlight: false },
          { label: 'Trades', value: data.total_trades || 0, highlight: false },
        ];

        stats.forEach(stat => {
          const div = document.createElement('div');
          div.className = 'portfolio-stat';

          const label = document.createElement('div');
          label.className = 'label';
          label.textContent = stat.label;

          const value = document.createElement('div');
          value.className = 'value' + (stat.highlight ? ' highlight' : '');
          if (stat.color) value.style.color = stat.color;
          value.textContent = stat.value;

          div.appendChild(label);
          div.appendChild(value);
          el.appendChild(div);
        });
      } catch (err) {
        console.error('Failed to load portfolio:', err);
      }
    }


    function formatVol(v) {
      if (v == null) return '—';
      if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
      if (v >= 1e3) return (v / 1e3).toFixed(0) + 'K';
      return String(v);
    }

    function buildCard(ticker) {
      const card = document.createElement('div');
      card.className = 'ticker-card';

      // Header
      const header = document.createElement('div');
      header.className = 'ticker-card-header';

      const left = document.createElement('div');
      left.className = 'ticker-card-header-left';
      const symbolEl = document.createElement('div');
      symbolEl.className = 'ticker-symbol';
      symbolEl.textContent = ticker.symbol;
      const nameEl = document.createElement('div');
      nameEl.className = 'ticker-name';
      nameEl.title = ticker.name || '';
      nameEl.textContent = ticker.name || '—';
      left.appendChild(symbolEl);
      left.appendChild(nameEl);

      const right = document.createElement('div');
      right.className = 'ticker-card-header-right';
      if (ticker.exchange) {
        const exBadge = document.createElement('span');
        exBadge.className = 'ticker-badge';
        exBadge.textContent = ticker.exchange;
        right.appendChild(exBadge);
      }
      const typeBadge = document.createElement('span');
      typeBadge.className = 'ticker-badge';
      typeBadge.textContent = ticker.asset_type;
      right.appendChild(typeBadge);

      const refreshBtn = document.createElement('button');
      refreshBtn.className = 'ticker-refresh-btn';
      refreshBtn.title = 'Refresh';
      refreshBtn.textContent = '⟳';
      refreshBtn.onclick = () => refreshOneTicker(ticker.id, refreshBtn);
      right.appendChild(refreshBtn);

      header.appendChild(left);
      header.appendChild(right);
      card.appendChild(header);

      if (ticker.price != null) {
        const isUp = (ticker.change_pct ?? 0) >= 0;

        // Price row
        const priceRow = document.createElement('div');
        priceRow.className = 'ticker-price-row';
        const priceEl = document.createElement('div');
        priceEl.className = 'ticker-price';
        priceEl.textContent = '$' + formatPrice(ticker.price);
        const changeEl = document.createElement('div');
        changeEl.className = 'ticker-change ' + (isUp ? 'positive' : 'negative');
        const arrow = isUp ? '▲' : '▼';
        const absChange = ticker.change != null ? ' $' + Math.abs(parseFloat(ticker.change)).toFixed(2) : '';
        const pctChange = ticker.change_pct != null ? ' (' + Math.abs(parseFloat(ticker.change_pct)).toFixed(2) + '%)' : '';
        changeEl.textContent = arrow + absChange + pctChange;
        priceRow.appendChild(priceEl);
        priceRow.appendChild(changeEl);
        card.appendChild(priceRow);

        // Stat grid
        const statGrid = document.createElement('div');
        statGrid.className = 'ticker-stat-grid';
        const stats = [
          { label: 'HIGH',   value: ticker.high,       cls: 'up' },
          { label: 'LOW',    value: ticker.low,         cls: 'down' },
          { label: 'OPEN',   value: ticker.open,        cls: '' },
          { label: 'PREV',   value: ticker.prev_close,  cls: '' },
          { label: 'VOLUME', value: null,               cls: '', raw: formatVol(ticker.volume) },
          { label: 'VWAP',   value: ticker.vwap,        cls: '' },
        ];
        stats.forEach(s => {
          const stat = document.createElement('div');
          stat.className = 'ticker-stat';
          const lbl = document.createElement('span');
          lbl.className = 'stat-label';
          lbl.textContent = s.label;
          const val = document.createElement('span');
          val.className = 'stat-value' + (s.cls ? ' ' + s.cls : '');
          val.textContent = s.raw != null ? s.raw : (s.value != null ? '$' + formatPrice(s.value) : '—');
          stat.appendChild(lbl);
          stat.appendChild(val);
          statGrid.appendChild(stat);
        });
        card.appendChild(statGrid);

        // Footer timestamp
        if (ticker.fetched_at) {
          const footer = document.createElement('div');
          footer.className = 'ticker-footer';
          footer.textContent = 'Bijgewerkt om ' + new Date(ticker.fetched_at).toLocaleTimeString('nl-BE', { hour: '2-digit', minute: '2-digit' });
          card.appendChild(footer);
        }
      } else {
        const noData = document.createElement('div');
        noData.className = 'ticker-no-data';
        noData.textContent = ticker.asset_type === 'CRYPTO'
          ? 'Crypto snapshot niet beschikbaar'
          : 'Geen data — wacht op refresh';
        card.appendChild(noData);
      }

      return card;
    }

    async function loadTickers() {
      try {
        const data = await fetch(API + '/api/symbols').then(r => r.json());
        const grid = document.getElementById('ticker-grid');
        grid.textContent = '';

        if (data.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.style.gridColumn = '1 / -1';
          const h3 = document.createElement('h3');
          h3.textContent = 'Geen tickers geconfigureerd';
          const p = document.createElement('p');
          p.textContent = 'Voeg tickers toe via Admin.';
          empty.appendChild(h3);
          empty.appendChild(p);
          grid.appendChild(empty);
          return;
        }

        data.forEach(ticker => grid.appendChild(buildCard(ticker)));
      } catch (err) {
        console.error('Failed to load tickers:', err);
        const grid = document.getElementById('ticker-grid');
        grid.textContent = '';
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.style.gridColumn = '1 / -1';
        const h3 = document.createElement('h3');
        h3.textContent = 'Fout bij laden';
        const p = document.createElement('p');
        p.textContent = err.message;
        empty.appendChild(h3);
        empty.appendChild(p);
        grid.appendChild(empty);
      }
    }

    async function triggerRefresh() {
      const btn = document.getElementById('global-refresh-btn');
      const icon = document.getElementById('refresh-icon');
      btn.disabled = true;
      icon.style.animation = 'spin 0.8s linear infinite';
      try {
        await fetch('/api/snapshots/refresh', { method: 'POST' });
        await loadTickers();
      } finally {
        btn.disabled = false;
        icon.style.animation = '';
      }
    }

    async function refreshOneTicker(id, btn) {
      btn.classList.add('spinning');
      try {
        await fetch('/api/snapshots/refresh/' + id, { method: 'POST' });
        await loadTickers();
      } finally {
        btn.classList.remove('spinning');
      }
    }

    function refresh() {
      loadPortfolio();
      loadTickers();
    }

    refresh();
    setInterval(refresh, 60000);
  </script>
</body>
</html>
