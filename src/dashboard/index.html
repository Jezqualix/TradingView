<!DOCTYPE html>
<html lang="nl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradingView × Claude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-600: #007c30;
      --brand-700: #026c3d;
      --brand-900: #003012;
      --accent: #ffdd00;
      --accent-hover: #e6c800;

      --bg: #0f1612;
      --bg-card: #1a2420;
      --bg-header: #0a0f0c;

      --text-primary: #f0f0f0;
      --text-body: #c8c8c8;
      --text-muted: #888888;
      --text-on-dark: #f0f0f0;

      --border: #2a3830;
      --border-card: #2a3830;
      --shadow-card: 0 1px 4px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.4), 0 8px 32px rgba(0,0,0,0.3);

      --radius: 12px;
      --radius-sm: 6px;
      --radius-pill: 9999px;

      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --transition: 0.18s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.6;
      background-color: var(--bg);
      color: var(--text-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: var(--bg-header);
      border-bottom: 3px solid var(--accent);
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-card);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      color: var(--brand-600);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    header h1 span { color: var(--accent); }

    .header-links {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .header-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-link:hover {
      background: rgba(0, 160, 64, 0.1);
      color: var(--brand-600);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px;
      flex: 1;
    }

    .portfolio-widget {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 32px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      box-shadow: var(--shadow-card);
    }

    .portfolio-stat {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .portfolio-stat .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .portfolio-stat .value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .portfolio-stat .value.highlight {
      color: var(--brand-600);
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    .ticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .ticker-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-top: 3px solid var(--brand-600);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-card);
      transition: all var(--transition);
      cursor: default;
    }

    .ticker-card:hover {
      border-top-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .ticker-symbol {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .ticker-price {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .ticker-change {
      display: flex;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .ticker-change.positive { color: var(--brand-600); }
    .ticker-change.negative { color: #ff6666; }
    .ticker-change-pct { font-size: 1rem; }
    .ticker-change-abs { font-size: 0.9rem; opacity: 0.8; }

    .ticker-signal {
      display: inline-block;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .ticker-signal.buy { background: rgba(0, 160, 64, 0.2); color: var(--brand-600); }
    .ticker-signal.sell { background: rgba(255, 100, 100, 0.2); color: #ff6666; }
    .ticker-time { font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 4px; }
    .ticker-position { display: inline-block; padding: 4px 10px; border-radius: var(--radius-pill); background: var(--accent); color: var(--brand-900); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-left: 8px; }
    .ticker-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state h3 { color: var(--text-primary); margin-bottom: 8px; }
    .loading { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .loading span { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .container { padding: 16px; }
      .portfolio-widget { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px; }
      .ticker-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
      header { padding: 16px 20px; }
      .header-link { font-size: 0.8rem; padding: 6px 10px; }
    }

    @media (max-width: 480px) {
      .container { padding: 12px; }
      .portfolio-widget { grid-template-columns: 1fr; gap: 8px; padding: 12px; }
      .ticker-grid { grid-template-columns: 1fr; }
      .section-title { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>TradingView <span>×</span> Claude</h1>
    <div class="header-links">
      <span id="finnhub-status" style="display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 0.9rem;">● Finnhub</span>
      <a href="/dashboard.html" class="header-link">📊 Dashboard</a>
      <a href="/admin.html" class="header-link">⚙️ Beheer</a>
    </div>
  </header>

  <div class="container">
    <div class="portfolio-widget" id="portfolio"></div>
    <h2 class="section-title">Koersen</h2>
    <div class="ticker-grid" id="ticker-grid">
      <div class="loading"><span>⏳</span> Laden...</div>
    </div>
  </div>

  <script>
    const API = '';

    function timeAgo(date) {
      if (!date) return '—';
      const d = new Date(date);
      const now = new Date();
      const seconds = Math.floor((now - d) / 1000);
      if (seconds < 60) return Math.floor(seconds) + 's geleden';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return minutes + 'm geleden';
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return hours + 'h geleden';
      return d.toLocaleDateString('nl-BE');
    }

    function formatPrice(price) {
      if (!price && price !== 0) return '—';
      if (price >= 1) return parseFloat(price).toFixed(2);
      return parseFloat(price).toFixed(price < 0.01 ? 4 : 2);
    }

    async function loadPortfolio() {
      try {
        const data = await fetch(API + '/api/portfolio').then(r => r.json());
        if (!data) return;

        const winRate = data.total_trades > 0
          ? ((data.winning_trades / data.total_trades) * 100).toFixed(1)
          : '0.0';

        const pnl = data.current_balance - data.starting_balance;
        const el = document.getElementById('portfolio');
        el.innerHTML = '';

        const stats = [
          { label: 'Balans', value: '$' + data.current_balance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }), highlight: true },
          { label: 'P&L', value: '$' + (pnl >= 0 ? '+' : '') + pnl.toFixed(2), highlight: false, color: pnl >= 0 ? 'var(--brand-600)' : '#ff6666' },
          { label: 'Win Rate', value: winRate + '%', highlight: true },
          { label: 'Posities', value: data.open_positions || 0, highlight: false },
          { label: 'Trades', value: data.total_trades || 0, highlight: false },
        ];

        stats.forEach(stat => {
          const div = document.createElement('div');
          div.className = 'portfolio-stat';

          const label = document.createElement('div');
          label.className = 'label';
          label.textContent = stat.label;

          const value = document.createElement('div');
          value.className = 'value' + (stat.highlight ? ' highlight' : '');
          if (stat.color) value.style.color = stat.color;
          value.textContent = stat.value;

          div.appendChild(label);
          div.appendChild(value);
          el.appendChild(div);
        });
      } catch (err) {
        console.error('Failed to load portfolio:', err);
      }
    }

    async function loadTickers() {
      try {
        const data = await fetch(API + '/api/symbols').then(r => r.json());
        const grid = document.getElementById('ticker-grid');
        grid.innerHTML = '';

        if (data.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.style.gridColumn = '1 / -1';
          const h3 = document.createElement('h3');
          h3.textContent = 'Geen signalen ontvangen';
          const p = document.createElement('p');
          p.textContent = 'Zodra TradingView signalen verzendt, verschijnen de koersen hier.';
          empty.appendChild(h3);
          empty.appendChild(p);
          grid.appendChild(empty);
          return;
        }

        data.forEach(ticker => {
          const card = document.createElement('div');
          card.className = 'ticker-card';

          const symbol = document.createElement('div');
          symbol.className = 'ticker-symbol';
          symbol.textContent = ticker.yahooSymbol || ticker.symbol;
          card.appendChild(symbol);

          // Dual price display: Yahoo + IBKR
          const pricesContainer = document.createElement('div');
          pricesContainer.style.cssText = 'display: grid; grid-template-columns: 1fr' + (ticker.ibkr ? ' 1fr' : '') + '; gap: 12px; padding: 12px 0;';

          // Yahoo Finance price
          if (ticker.yahoo) {
            const yahooCol = document.createElement('div');
            const yahooLabel = document.createElement('div');
            yahooLabel.style.cssText = 'font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 4px;';
            yahooLabel.textContent = 'Yahoo';

            const yahooPrice = document.createElement('div');
            yahooPrice.style.cssText = 'font-size: 1.2rem; font-weight: 700; color: var(--text-primary);';
            yahooPrice.textContent = '$' + formatPrice(ticker.yahoo.price);

            const yahooChange = document.createElement('div');
            yahooChange.style.cssText = 'font-size: 0.85rem; font-weight: 600; color: ' + (ticker.yahoo.changePercent >= 0 ? 'var(--brand-600)' : '#ff6666') + ';';
            yahooChange.textContent = (ticker.yahoo.changePercent >= 0 ? '▲' : '▼') + ' ' + ticker.yahoo.changePercent.toFixed(2) + '%';

            yahooCol.appendChild(yahooLabel);
            yahooCol.appendChild(yahooPrice);
            yahooCol.appendChild(yahooChange);
            pricesContainer.appendChild(yahooCol);
          }

          // Finnhub price (if available)
          if (ticker.finnhub) {
            const finnhubCol = document.createElement('div');
            const finnhubLabel = document.createElement('div');
            finnhubLabel.style.cssText = 'font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 4px;';
            finnhubLabel.textContent = 'Finnhub';

            const finnhubPrice = document.createElement('div');
            finnhubPrice.style.cssText = 'font-size: 1.2rem; font-weight: 700; color: var(--text-primary);';
            finnhubPrice.textContent = '$' + formatPrice(ticker.finnhub.price);

            const finnhubChange = document.createElement('div');
            finnhubChange.style.cssText = 'font-size: 0.85rem; font-weight: 600; color: ' + (ticker.finnhub.changePercent >= 0 ? 'var(--brand-600)' : '#ff6666') + ';';
            finnhubChange.textContent = (ticker.finnhub.changePercent >= 0 ? '▲' : '▼') + ' ' + ticker.finnhub.changePercent.toFixed(2) + '%';

            finnhubCol.appendChild(finnhubLabel);
            finnhubCol.appendChild(finnhubPrice);
            finnhubCol.appendChild(finnhubChange);
            pricesContainer.appendChild(finnhubCol);
          }

          card.appendChild(pricesContainer);

          if (ticker.lastSignal) {
            const signal = document.createElement('span');
            signal.className = 'ticker-signal ' + (ticker.lastSignal.action?.toUpperCase() === 'BUY' ? 'buy' : 'sell');
            signal.textContent = ticker.lastSignal.action;

            const time = document.createElement('span');
            time.className = 'ticker-time';
            time.textContent = timeAgo(ticker.lastSignal.time);

            signal.appendChild(time);
            card.appendChild(signal);
          }

          if (ticker.hasOpenPosition) {
            const pos = document.createElement('span');
            pos.className = 'ticker-position';
            pos.textContent = '● OPEN';
            card.appendChild(pos);
          }

          const meta = document.createElement('div');
          meta.className = 'ticker-meta';
          meta.textContent = ticker.yahoo?.exchange || (ticker.yahooSymbol?.includes('-') ? 'Crypto' : 'Stock');
          card.appendChild(meta);

          grid.appendChild(card);
        });
      } catch (err) {
        console.error('Failed to load tickers:', err);
        const grid = document.getElementById('ticker-grid');
        grid.innerHTML = '';
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.style.gridColumn = '1 / -1';
        const h3 = document.createElement('h3');
        h3.textContent = 'Fout bij laden';
        const p = document.createElement('p');
        p.textContent = err.message;
        empty.appendChild(h3);
        empty.appendChild(p);
        grid.appendChild(empty);
      }
    }

    async function updateFinnhubStatus() {
      try {
        const status = await fetch(API + '/api/finnhub/status').then(r => r.json());
        const el = document.getElementById('finnhub-status');
        if (status.configured) {
          el.style.color = 'var(--brand-600)';
          el.textContent = '● Finnhub';
        } else {
          el.style.color = 'var(--text-muted)';
          el.textContent = '○ Finnhub';
        }
      } catch (err) {
        console.warn('Finnhub status check failed:', err);
        document.getElementById('finnhub-status').style.color = 'var(--text-muted)';
      }
    }

    function refresh() {
      loadPortfolio();
      loadTickers();
      updateFinnhubStatus();
    }

    refresh();
    setInterval(refresh, 60000);
    setInterval(updateFinnhubStatus, 30000); // Check Finnhub status every 30s
  </script>
</body>
</html>
